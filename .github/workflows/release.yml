name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release

      - name: Package
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}"
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item target/release/WinSearch.exe dist/
          Copy-Item target/release/wsearch.exe   dist/
          Copy-Item README.md, LICENSE           dist/
          Compress-Archive -Path dist/* -DestinationPath "WinSearch-$ver-windows-x64.zip" -Force

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: WinSearch-*.zip
          generate_release_notes: true
